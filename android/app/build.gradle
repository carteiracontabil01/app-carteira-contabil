plugins {
   id "com.android.application"
   id "kotlin-android"
   id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

// ========================================
// WHITE LABEL CONFIGURATION
// ========================================
// Detecta o environment do build (--dart-define=ENV=xxx)
def dartEnvironmentVariables = [:]
if (project.hasProperty('dart-defines')) {
    dartEnvironmentVariables = project.property('dart-defines')
        .split(',')
        .collectEntries { entry ->
            def pair = new String(entry.decodeBase64(), 'UTF-8').split('=')
            [(pair.first()): pair.last()]
        }
}

def envName = dartEnvironmentVariables.ENV ?: 'demo'

println "🏗️  Building for environment: $envName"

// Mapeamento de environments para package IDs
def packageIds = [
    'demo': 'com.carteiracontabil.app',
    'lopes': 'com.carteiracontabil.app.lopes',
    'mercado': 'com.carteiracontabil.app.mercado',
    'pet': 'com.carteiracontabil.app.pet'
]

// Mapeamento de environments para nomes de app
def appNames = [
    'demo': 'Carteira Contábil',
    'lopes': 'Carteira Contábil Lopes',
    'mercado': 'Carteira Contábil Mercado',
    'pet': 'Carteira Contábil Pet'
]

def currentPackageId = packageIds[envName] ?: packageIds['demo']
def currentAppName = appNames[envName] ?: appNames['demo']

println "📦 Package ID: $currentPackageId"
println "📱 App Name: $currentAppName"

android {
    namespace 'com.carteiracontabil.app'
    compileSdkVersion 35
    

    compileOptions {
        coreLibraryDesugaringEnabled true
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    lintOptions {
        disable 'InvalidPackage'
        checkReleaseBuilds false
    }

    defaultConfig {
        // White Label: Package ID dinâmico baseado no environment
        applicationId currentPackageId
        minSdkVersion flutter.minSdkVersion
        targetSdkVersion 35
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        
        // White Label: Nome do app dinâmico
        resValue "string", "app_name", currentAppName
    }

   signingConfigs {
       release {
           keyAlias keystoreProperties['keyAlias']
           keyPassword keystoreProperties['keyPassword']
           storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
           storePassword keystoreProperties['storePassword']
       }
   }

    buildTypes {
        release {
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig signingConfigs.debug
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:2.1.0"
}

// ✅ Plugin do Google Services (Firebase)
apply plugin: 'com.google.gms.google-services'
